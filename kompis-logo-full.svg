<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <!-- Node Connection Gradients -->
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8338ec" />
      <stop offset="100%" stop-color="#641ed3" />
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffbe0b" />
      <stop offset="100%" stop-color="#ffd043" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8338ec" />
      <stop offset="100%" stop-color="#ffbe0b" />
    </linearGradient>
    <!-- Glow Filters -->
    <filter id="yellowGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="violetGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Group: K -->
  <text x="35" y="85" font-family="'Poppins', sans-serif" font-weight="800" font-size="76" fill="#8338ec" letter-spacing="1">K</text>

  <!-- Group: Interactive Node 'O' -->
  <g transform="translate(112, 18)">
    <!-- Connection Capsule/Line -->
    <line x1="18" y1="62" x2="48" y2="28" stroke="url(#lineGrad)" stroke-width="8" stroke-linecap="round" />
    <!-- Node 1: Violet Base -->
    <circle cx="16" cy="64" r="14" fill="url(#violetGrad)" filter="url(#violetGlow)" />
    <circle cx="16" cy="64" r="6" fill="#ffffff" />
    <!-- Node 2: Gold Accent -->
    <circle cx="50" cy="26" r="14" fill="url(#yellowGrad)" filter="url(#yellowGlow)" />
    <circle cx="50" cy="26" r="6" fill="#1f1435" />
  </g>

  <!-- Group: MPIS -->
  <text x="185" y="85" font-family="'Poppins', sans-serif" font-weight="800" font-size="76" fill="#8338ec" letter-spacing="1">MPIS</text>
</svg>
