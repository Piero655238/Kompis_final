<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="appBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d4edd" />
      <stop offset="50%" stop-color="#8338ec" />
      <stop offset="100%" stop-color="#560bad" />
    </linearGradient>
    <linearGradient id="nodeYellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe169" />
      <stop offset="100%" stop-color="#ffbe0b" />
    </linearGradient>
    <linearGradient id="nodeWhite" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2d9f3" />
    </linearGradient>
    <linearGradient id="connectorGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="url(#nodeWhite)" />
      <stop offset="100%" stop-color="url(#nodeYellow)" />
    </linearGradient>
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.3" />
    </filter>
    <filter id="nodeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Squircle Base Container -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#appBgGrad)" />

  <!-- Dynamic Glowing Orbit Ring -->
  <circle cx="256" cy="256" r="180" stroke="rgba(255, 255, 255, 0.15)" stroke-width="6" fill="none" stroke-dasharray="16 12" />

  <!-- Center Graphic Group: Connection Nodes -->
  <g transform="translate(136, 136)" filter="url(#iconShadow)">
    <!-- Connection Bridge Line -->
    <line x1="60" y1="180" x2="180" y2="60" stroke="#ffffff" stroke-width="28" stroke-linecap="round" filter="url(#nodeGlow)" />
    <line x1="60" y1="180" x2="180" y2="60" stroke="#ffbe0b" stroke-width="20" stroke-linecap="round" />

    <!-- Node 1: Pure White Base -->
    <circle cx="60" cy="180" r="48" fill="url(#nodeWhite)" filter="url(#nodeGlow)" />
    <circle cx="60" cy="180" r="22" fill="#8338ec" />

    <!-- Node 2: Gold Accent Top Right -->
    <circle cx="180" cy="60" r="48" fill="url(#nodeYellow)" filter="url(#nodeGlow)" />
    <circle cx="180" cy="60" r="22" fill="#1f1435" />
  </g>
</svg>
