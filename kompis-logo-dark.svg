<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <linearGradient id="violetGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a056ff" />
      <stop offset="100%" stop-color="#8338ec" />
    </linearGradient>
    <linearGradient id="yellowGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffbe0b" />
      <stop offset="100%" stop-color="#ffd043" />
    </linearGradient>
    <linearGradient id="lineGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#ffbe0b" />
    </linearGradient>
    <filter id="glowDark" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Group: K -->
  <text x="35" y="85" font-family="'Poppins', sans-serif" font-weight="800" font-size="76" fill="#ffffff" letter-spacing="1">K</text>

  <!-- Group: Interactive Node 'O' -->
  <g transform="translate(112, 18)">
    <line x1="18" y1="62" x2="48" y2="28" stroke="url(#lineGradDark)" stroke-width="8" stroke-linecap="round" />
    <circle cx="16" cy="64" r="14" fill="#ffffff" filter="url(#glowDark)" />
    <circle cx="16" cy="64" r="6" fill="#8338ec" />
    <circle cx="50" cy="26" r="14" fill="url(#yellowGradDark)" filter="url(#glowDark)" />
    <circle cx="50" cy="26" r="6" fill="#1f1435" />
  </g>

  <!-- Group: MPIS -->
  <text x="185" y="85" font-family="'Poppins', sans-serif" font-weight="800" font-size="76" fill="#ffffff" letter-spacing="1">MPIS</text>
</svg>
